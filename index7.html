<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Online Food Ordering System</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f0f4f8;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
}

h1{
text-align:center;
color:#ff6600;
margin-bottom:20px;
}

.form-group{
margin-bottom:15px;
}

input{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:5px;
}

button{
background:#ff6600;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#e65c00;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#ff6600;
color:white;
}

.delete-btn{
background:red;
}

.stats{
margin-top:20px;
font-size:18px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>🍔 Online Food Ordering System</h1>

<div class="form-group">
<input type="text" id="foodName" placeholder="Food Name">
</div>

<div class="form-group">
<input type="text" id="foodCategory" placeholder="Category">
</div>

<div class="form-group">
<input type="number" id="foodPrice" placeholder="Price">
</div>

<div class="form-group">
<input type="number" id="foodQuantity" placeholder="Quantity">
</div>

<button onclick="addFood()">Add Order</button>

<div class="stats">
Total Orders :
<span id="totalOrders">0</span>
<br>
Total Bill : ₹<span id="totalBill">0</span>
</div>

<table>

<thead>
<tr>
<th>ID</th>
<th>Food Name</th>
<th>Category</th>
<th>Price</th>
<th>Quantity</th>
<th>Total</th>
<th>Action</th>
</tr>
</thead>

<tbody id="foodTable">
</tbody>

</table>

</div>

<script>

let count = 0;

function addFood(){

const food=document.getElementById("foodName").value;
const category=document.getElementById("foodCategory").value;
const price=document.getElementById("foodPrice").value;
const quantity=document.getElementById("foodQuantity").value;

if(food==="" || category==="" || price==="" || quantity===""){
alert("Please fill all fields");
return;
}

count++;

const total=price*quantity;

const row=document.createElement("tr");

row.innerHTML=`
<td>${count}</td>
<td>${food}</td>
<td>${category}</td>
<td>₹${price}</td>
<td>${quantity}</td>
<td>₹${total}</td>
<td><button class="delete-btn">Delete</button></td>
`;

document.getElementById("foodTable").appendChild(row);

updateData();

row.querySelector(".delete-btn").addEventListener("click",function(){
row.remove();
updateData();
});

document.getElementById("foodName").value="";
document.getElementById("foodCategory").value="";
document.getElementById("foodPrice").value="";
document.getElementById("foodQuantity").value="";

}

function updateData(){

const rows=document.querySelectorAll("#foodTable tr");

document.getElementById("totalOrders").innerText=rows.length;

let bill=0;

rows.forEach(row=>{
bill += Number(row.cells[5].innerText.replace("₹",""));
});

document.getElementById("totalBill").innerText=bill;

}

</script>

</body>
</html>
